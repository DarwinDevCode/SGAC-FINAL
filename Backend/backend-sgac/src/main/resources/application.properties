spring.application.name=sgac-final
server.port=8080

spring.flyway.user=postgres
spring.flyway.password=Postgresql123.

spring.datasource.url=jdbc:postgresql://localhost:5432/SGAC-FINAL
spring.datasource.username=postgres
spring.datasource.password=Postgresql123.
# Cloudinary Config (Dummy values for compilation bypass since it's being phased out for local storage)
cloudinary.cloud_name=dummy_cloud_name
cloudinary.api_key=dummy_api_key
cloudinary.api_secret=dummy_api_secret
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.schemas=seguridad, public, academico, ayudantia, convocatoria, notificacion, postulacion
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

