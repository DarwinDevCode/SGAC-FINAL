<div class="comunicacion-page">

  <div class="page-header">
    <div>
      <h1><i-lucide name="message-square" class="inline-icon"></i-lucide> Canal de Comunicación</h1>
      <p class="subtitle">Supervisa y responde a tus ayudantes asignados.</p>
    </div>
  </div>

  <div class="layout-grid">

    <!-- Panel izquierdo: Lista de ayudantes -->
    <div class="panel-list">
      <div class="list-header">
        <span>Mis Ayudantes</span>
        <span class="badge-count">{{ ayudantias.length }}</span>
      </div>
      <div class="search-box">
        <i-lucide name="search" class="w-4 h-4 text-gray-400"></i-lucide>
        <input [(ngModel)]="searchQuery" placeholder="Buscar ayudante o asignatura..." />
      </div>

      <div *ngIf="isLoading" class="loading-state">
        <i-lucide name="loader-2" class="w-8 h-8 animate-spin text-blue-500"></i-lucide>
      </div>

      <div *ngIf="!isLoading && filteredAyudantias.length === 0" class="empty-list">
        Sin resultados
      </div>

      <div class="list-items">
        <div *ngFor="let a of filteredAyudantias"
             (click)="seleccionar(a)"
             class="list-item"
             [class.active]="a.idAyudantia === idAyudantiaSeleccionada">
          <div class="item-avatar">{{ a.nombreEstudiante.charAt(0) || '?' }}</div>
          <div class="item-info">
            <div class="item-name">{{ a.nombreEstudiante }}</div>
            <div class="item-sub">{{ a.asignatura }}</div>
          </div>
          <span class="item-badge" [class.active-badge]="a.estado === 'ACTIVA'">
            {{ a.estado }}
          </span>
        </div>
      </div>
    </div>

    <!-- Panel derecho: Chat -->
    <div class="panel-chat">
      <app-chat-interno-docente
        *ngIf="idAyudantiaSeleccionada"
        [idAyudantia]="idAyudantiaSeleccionada">
      </app-chat-interno-docente>

      <div *ngIf="!idAyudantiaSeleccionada" class="no-selection">
        <i-lucide name="message-square" class="w-16 h-16 opacity-20"></i-lucide>
        <p>Selecciona un ayudante para iniciar la comunicación.</p>
      </div>
    </div>

  </div>
</div>
